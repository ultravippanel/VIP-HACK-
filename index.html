<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sure Shot Pro</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0c0c2b,#1a1a40);
  color:white;
  text-align:center;
}

/* LOGIN */
.login-box{
  width:90%;
  margin:100px auto;
  background:white;
  color:black;
  padding:25px;
  border-radius:20px;
}
input{
  width:90%;
  padding:12px;
  margin:10px;
  border-radius:10px;
}
button{
  width:90%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:25px;
  background:#6a5cff;
  color:white;
}

/* DASHBOARD */
.game{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}
.game button{
  padding:20px;
  border-radius:15px;
  background:white;
  color:black;
  font-weight:bold;
}

/* HIDE */
.page{display:none;}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="login" class="page" style="display:block;">
  <div class="login-box">
    <h2>WELCOME BACK</h2>
    <input placeholder="Phone">
    <input placeholder="Password">
    <button onclick="goDashboard()">LOGIN</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
  <h2>SELECT GAME</h2>
  <div class="game">
    <button onclick="openGame()">91 Club</button>
    <button onclick="openGame()">Tiranga</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="page">
  <h2>WinGo 1 Minute</h2>

  <h1 id="timer">60</h1>
  <h3 id="result">Result: ?</h3>

  <button onclick="startGame()">Start</button>

  <br><br>
  <button onclick="goPayment()">GET VIP ₹850</button>
</div>

<!-- PAYMENT -->
<div id="payment" class="page">
  <h2>Scan & Pay ₹850</h2>

  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay">

  <p>After payment contact admin</p>

  <button onclick="backGame()">Back</button>
</div>

<script>

/* PAGE SWITCH */
function show(page){
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.getElementById(page).style.display='block';
}

function goDashboard(){ show('dashboard'); }
function openGame(){ show('game'); }
function goPayment(){ show('payment'); }
function backGame(){ show('game'); }

/* TIMER */
let time = 60;
let interval;

function startGame(){
  clearInterval(interval);
  interval = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = time;

    if(time <= 0){
      clearInterval(interval);
      generateResult();
      time = 60;
      setTimeout(startGame,1000);
    }
  },1000);
}

/* RESULT */
function generateResult(){
  let number = Math.floor(Math.random()*10);

  let color="";
  if(number<=4){color="GREEN";}
  else if(number<=8){color="RED";}
  else{color="VIOLET";}

  document.getElementById("result").innerText =
    "Result: "+number+" ("+color+")";
}

</script>

</body>
</html>
