<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP PANEL</title>

<style>
body {
    background: #0f172a;
    font-family: Arial;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    color: gold;
    margin-bottom: 20px;
}

.top-bar {
    display: flex;
    justify-content: space-around;
    font-weight: bold;
    margin-bottom: 15px;
}

input, select {
    width: 80%;
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 20px;
    background: gold;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.result-box {
    margin-top: 20px;
    padding: 20px;
    border: 2px solid gold;
    border-radius: 10px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

<h1>VIP PANEL</h1>

<div class="top-bar">
    <div>Period</div>
    <div>Big/Small</div>
    <div>Number</div>
</div>

<input type="text" id="period" placeholder="Enter Period Number">
<select id="bs">
    <option value="">Select Big/Small</option>
    <option>Big</option>
    <option>Small</option>
</select>
<input type="number" id="num" placeholder="Enter Number">

<button onclick="showResult()">UPLOAD</button>

<div class="result-box" id="result">
    Result will show here
</div>

</div>

<script>
function showResult() {
    let p = document.getElementById("period").value;
    let bs = document.getElementById("bs").value;
    let num = document.getElementById("num").value;

    document.getElementById("result").innerHTML =
        "Period: " + p + "<br>" +
        "Type: " + bs + "<br>" +
        "Number: " + num;
}
</script>

</body>
</html>
