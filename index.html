<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP PANEL</title>

<style>
body {
    background: #000;
    font-family: Arial;
    color: white;
    text-align: center;
}

h1 {
    color: gold;
    margin-top: 20px;
}

input, select {
    width: 85%;
    padding: 12px;
    margin: 8px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    padding: 12px 25px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    margin-top: 10px;
}

/* 🔥 RESULT BOX */
.result-box {
    margin: 30px auto;
    width: 90%;
    max-width: 320px;
    padding: 25px;
    border-radius: 15px;
    background: #0d0d0d;
    border: 2px solid red;

    box-shadow: 0 0 25px red, 0 0 60px red;
}

.result-title {
    color: gold;
    font-weight: bold;
    margin-bottom: 10px;
}

#prd {
    margin-bottom: 10px;
    color: #ccc;
}

.result-main {
    font-size: 32px;
    color: yellow;
    font-weight: bold;
    margin: 20px 0;
}

.confidence {
    font-size: 14px;
    color: #aaa;
}
</style>

</head>

<body>

<h1>VIP PANEL</h1>

<input type="text" id="period" placeholder="Enter Period">
<select id="bs">
    <option>SMALL</option>
    <option>BIG</option>
</select>
<input type="number" id="num" placeholder="Enter Number">

<button onclick="showResult()">UPLOAD</button>

<div class="result-box">
    <div class="result-title">VIP NUMBER PANEL</div>
    <div id="prd">PRD --</div>

    <div class="result-main" id="result">
        WAITING...
    </div>

    <div class="confidence" id="conf">
        Confidence --%
    </div>
</div>

<script>
function showResult() {
    let p = document.getElementById("period").value;
    let bs = document.getElementById("bs").value;
    let num = document.getElementById("num").value;

    document.getElementById("prd").innerHTML = "PRD " + p;
    document.getElementById("result").innerHTML = bs + " " + num;

    let conf = Math.floor(Math.random() * 5) + 95;
    document.getElementById("conf").innerHTML = "Confidence " + conf + "%";
}
</script>

</body>
</html>
