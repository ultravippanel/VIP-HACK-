<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP PANEL</title>

<style>
body {
    background: #0a0a0a;
    font-family: Arial;
    color: white;
    text-align: center;
}

/* Header */
h1 {
    color: gold;
    margin-top: 20px;
}

/* Input */
input, select {
    width: 80%;
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

/* Button */
button {
    padding: 10px 20px;
    background: red;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
}

/* 🔥 VIP RESULT BOX */
.result-box {
    margin: 30px auto;
    width: 300px;
    padding: 20px;
    border-radius: 15px;
    background: #0d0d0d;
    border: 2px solid red;

    /* Glow effect */
    box-shadow: 0 0 20px red, 0 0 40px red;
}

/* Title */
.result-title {
    color: gold;
    font-weight: bold;
    margin-bottom: 10px;
}

/* Main result */
.result-main {
    font-size: 30px;
    color: yellow;
    font-weight: bold;
    margin: 15px 0;
}

/* Confidence */
.confidence {
    font-size: 14px;
    color: #ccc;
}

/* Scan button */
.scan-btn {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    background: black;
    border: 1px solid red;
    color: white;
    border-radius: 10px;
}
</style>

</head>

<body>

<h1>VIP PANEL</h1>

<input type="text" id="period" placeholder="Enter Period">
<select id="bs">
    <option>Big</option>
    <option>Small</option>
</select>
<input type="number" id="num" placeholder="Enter Number">

<button onclick="showResult()">UPLOAD</button>

<!-- 🔥 Stylish Result Box -->
<div class="result-box">
    <div class="result-title">VIP NUMBER PANEL</div>
    <div id="prd">PRD --</div>

    <div class="result-main" id="result">
        WAITING...
    </div>

    <div class="confidence" id="conf">
        Confidence --%
    </div>

    <button class="scan-btn">SCAN</button>
</div>

<script>
function showResult() {
    let p = document.getElementById("period").value;
    let bs = document.getElementById("bs").value;
    let num = document.getElementById("num").value;

    document.getElementById("prd").innerHTML = "PRD " + p;
    document.getElementById("result").innerHTML = bs + " " + num;

    // Random confidence
    let conf = Math.floor(Math.random() * 5) + 95;
    document.getElementById("conf").innerHTML = "Confidence " + conf + "%";
}
</script>

</body>
</html>
