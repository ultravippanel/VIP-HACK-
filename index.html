<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP PANEL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #000, #1a1a1a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Glass UI */
.container {
    width: 350px;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 40px rgba(255,0,0,0.3);
}

h2 {
    color: gold;
    text-shadow: 0 0 10px gold;
}

/* Buttons */
.main-btn, .unlock-btn {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 12px;
    border: none;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.main-btn {
    background: #222;
}

.unlock-btn {
    background: linear-gradient(45deg, red, orange);
    box-shadow: 0 0 20px red;
}

.unlock-btn:hover {
    transform: scale(1.05);
}

/* Overlay */
.overlay {
    position: fixed;
    bottom: -100%;
    left: 0;
    width: 100%;
    height: 80%;
    background: rgba(0,0,0,0.95);
    transition: 0.4s;
    overflow-y: auto;
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
}

.overlay.active { bottom: 0; }

.server {
    padding: 16px;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
}

.server:hover {
    background: rgba(255,0,0,0.2);
}

/* Payment */
.amount {
    font-size: 30px;
    color: lime;
    font-weight: bold;
}

/* Loader */
.loader {
    display: none;
    margin-top: 15px;
}

.loader div {
    width: 10px;
    height: 10px;
    background: red;
    display: inline-block;
    margin: 3px;
    border-radius: 50%;
    animation: bounce 1s infinite;
}

.loader div:nth-child(2) { animation-delay: 0.2s; }
.loader div:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.5); }
}

/* Success */
.success {
    display: none;
    margin-top: 20px;
    color: lime;
}

</style>
</head>

<body>

<!-- MAIN -->
<div class="container" id="main">
    <h2>👑 VIP PANEL</h2>

    <button class="main-btn" onclick="openPopup()" id="serverBtn">Select Server</button>

    <button class="unlock-btn" onclick="startNow()">UNLOCK 🔓</button>
</div>

<!-- ALL SERVERS -->
<div class="overlay" id="popup">

    <div class="server">91CLUB <input type="radio" name="srv" value="91CLUB"></div>
    <div class="server">51GAME <input type="radio" name="srv" value="51GAME"></div>
    <div class="server">TIRANGA <input type="radio" name="srv" value="TIRANGA"></div>
    <div class="server">JAICLUB <input type="radio" name="srv" value="JAICLUB"></div>
    <div class="server">DM WIN <input type="radio" name="srv" value="DM WIN"></div>
    <div class="server">OK WIN <input type="radio" name="srv" value="OK WIN"></div>
    <div class="server">6CLUB <input type="radio" name="srv" value="6CLUB"></div>
    <div class="server">DIU WIN <input type="radio" name="srv" value="DIU WIN"></div>
    <div class="server">BDG GAME <input type="radio" name="srv" value="BDG GAME"></div>
    <div class="server">IN999 <input type="radio" name="srv" value="IN999"></div>
    <div class="server">JALWA GAME <input type="radio" name="srv" value="JALWA GAME"></div>
    <div class="server">TASHAN WIN <input type="radio" name="srv" value="TASHAN WIN"></div>
    <div class="server">SIKKIM GAME <input type="radio" name="srv" value="SIKKIM GAME"></div>
    <div class="server">GOA GAME <input type="radio" name="srv" value="GOA GAME"></div>

</div>

<!-- PAYMENT -->
<div class="container" id="payment" style="display:none;">
    <h2>💳 Payment</h2>
    <div class="amount">₹999</div>

    <button class="unlock-btn" onclick="payNow()">PAY NOW</button>

    <div class="loader" id="loader">
        <div></div><div></div><div></div>
    </div>

    <div class="success" id="successBox">
        <h3>Payment Successful ✅</h3>

        <a id="waBtn" target="_blank">
            <button class="unlock-btn">📸 SEND SCREENSHOT</button>
        </a>
    </div>
</div>

<script>

// popup
function openPopup() {
    document.getElementById("popup").classList.add("active");
}

// select server
document.querySelectorAll('input[name="srv"]').forEach(radio => {
    radio.addEventListener("change", function() {
        document.getElementById("serverBtn").innerText = this.value;
        document.getElementById("popup").classList.remove("active");
    });
});

// start
function startNow() {
    let selected = document.getElementById("serverBtn").innerText;

    if (selected === "Select Server") {
        alert("Select server first");
    } else {
        document.getElementById("main").style.display = "none";
        document.getElementById("payment").style.display = "block";
    }
}

// payment
function payNow() {

    let selected = document.getElementById("serverBtn").innerText;

    let upi = "upi://pay?pa=apexprime@jio&pn=VIP&am=999&cu=INR";
    window.location.href = upi;

    document.getElementById("loader").style.display = "block";

    setTimeout(() => {

        document.getElementById("loader").style.display = "none";
        document.getElementById("successBox").style.display = "block";

        let msg = encodeURIComponent("Payment done for " + selected);

        document.getElementById("waBtn").href =
        "https://wa.me/918515876235?text=" + msg;

    }, 4000);
}

</script>

</body>
</html>
