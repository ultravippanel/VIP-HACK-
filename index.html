<!DOCTYPE html>
<html>
<head>
<title>VIP PANEL</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* BOX */
.stat-card {
  background: rgba(0,0,0,0.9);
  padding: 20px;
  margin: 15px;
  border-radius: 15px;
  border: 2px solid gold;
  box-shadow: 0 0 20px gold;
}

/* VALUE (BIG TEXT) */
.stat-value {
  font-size: 40px;
  color: white;
  text-shadow: 0 0 15px white;
}

/* LABEL */
.stat-label {
  color: gold;
}

/* TIMER */
#timer {
  font-size: 50px;
  margin-top: 20px;
  color: gold;
}

/* PREDICTION */
#prediction {
  font-size: 50px;
  margin-top: 20px;
  text-shadow: 0 0 20px white;
}
</style>

</head>

<body>

<h1 style="color:gold;">VIP COLOR PREDICTION</h1>

<div class="stat-card">
  <div class="stat-value" id="number">0</div>
  <div class="stat-label">CURRENT NUMBER</div>
</div>

<div class="stat-card">
  <div class="stat-value" id="color">-</div>
  <div class="stat-label">RESULT COLOR</div>
</div>

<div class="stat-card">
  <div class="stat-value" id="round">0</div>
  <div class="stat-label">TOTAL ROUNDS</div>
</div>

<div id="timer">30</div>

<div id="prediction">WAIT...</div>

<script>
let time = 30;
let round = 0;

function getColor(n){
  if(n==0||n==5) return "VIOLET";
  if([1,3,7,9].includes(n)) return "RED";
  return "GREEN";
}

function newRound(){
  let num = Math.floor(Math.random()*10);
  let color = getColor(num);

  document.getElementById("number").innerText = num;
  document.getElementById("color").innerText = color;
  document.getElementById("round").innerText = ++round;

  let predict = ["RED","GREEN","VIOLET"];
  document.getElementById("prediction").innerText =
    predict[Math.floor(Math.random()*3)];
}

setInterval(()=>{
  time--;
  document.getElementById("timer").innerText = time;

  if(time<=0){
    time = 30;
    newRound();
  }
},1000);
</script>

</body>
</html>
