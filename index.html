<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP PANEL</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #000;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 340px;
    background: #111;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(255,0,0,0.4);
    text-align: center;
}

h2 {
    color: gold;
    margin-bottom: 20px;
}

.main-btn, .unlock-btn {
    width: 100%;
    padding: 14px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
    color: white;
}

.main-btn { background: #222; }
.unlock-btn { background: red; font-weight: bold; }

.overlay {
    position: fixed;
    bottom: -100%;
    left: 0;
    width: 100%;
    height: 75%;
    background: #111;
    transition: 0.3s;
    overflow-y: auto;
}

.overlay.active { bottom: 0; }

.server {
    padding: 18px;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
}

.payment {
    display: none;
}

.amount {
    font-size: 22px;
    color: red;
    font-weight: bold;
}

.success {
    display: none;
    margin-top: 20px;
    color: lime;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>

</head>

<body>

<div class="container" id="main">
    <h2>👑 VIP PANEL</h2>

    <button class="main-btn" onclick="openPopup()" id="serverBtn">Select Server</button>

    <button class="unlock-btn" onclick="startNow()">UNLOCK 🔓</button>
</div>

<div class="overlay" id="popup">
    <div class="server">91CLUB <input type="radio" name="srv" value="91CLUB"></div>
    <div class="server">51GAME <input type="radio" name="srv" value="51GAME"></div>
    <div class="server">TIRANGA <input type="radio" name="srv" value="TIRANGA"></div>
    <div class="server">JAICLUB <input type="radio" name="srv" value="JAICLUB"></div>
    <div class="server">DM WIN <input type="radio" name="srv" value="DM WIN"></div>
    <div class="server">OK WIN <input type="radio" name="srv" value="OK WIN"></div>
    <div class="server">6CLUB <input type="radio" name="srv" value="6CLUB"></div>
    <div class="server">DIU WIN <input type="radio" name="srv" value="DIU WIN"></div>
    <div class="server">BDG GAME <input type="radio" name="srv" value="BDG GAME"></div>
    <div class="server">IN999 <input type="radio" name="srv" value="IN999"></div>
    <div class="server">JALWA GAME <input type="radio" name="srv" value="JALWA GAME"></div>
    <div class="server">TASHAN WIN <input type="radio" name="srv" value="TASHAN WIN"></div>
    <div class="server">SIKKIM GAME <input type="radio" name="srv" value="SIKKIM GAME"></div>
    <div class="server">GOA GAME <input type="radio" name="srv" value="GOA GAME"></div>
</div>

<div class="container payment" id="payment">
    <h2>💳 Payment</h2>
    <div class="amount">₹199</div>

    <button class="unlock-btn" onclick="payNow()">PAY NOW</button>

    <div class="success" id="successBox">
        <h3>Payment Successful ✅</h3>

        <!-- WhatsApp Button -->
        <a id="waBtn" target="_blank">
            <button class="unlock-btn">📸 SEND SCREENSHOT</button>
        </a>
    </div>
</div>

<script>

function openPopup() {
    document.getElementById("popup").classList.add("active");
}

document.querySelectorAll('input[name="srv"]').forEach(radio => {
    radio.addEventListener("change", function() {
        document.getElementById("serverBtn").innerText = this.value;
        document.getElementById("popup").classList.remove("active");
    });
});

function startNow() {
    let selected = document.getElementById("serverBtn").innerText;

    if (selected === "Select Server") {
        alert("Select server first");
    } else {
        document.getElementById("main").style.display = "none";
        document.getElementById("payment").style.display = "block";
    }
}

function payNow() {

    let selected = document.getElementById("serverBtn").innerText;

    let upi = "upi://pay?pa=apexprime@jio&pn=VIP&am=199&cu=INR";
    window.location.href = upi;

    setTimeout(() => {

        document.getElementById("successBox").style.display = "block";

        let msg = encodeURIComponent("Hello, I have completed payment for " + selected + ". Here is my screenshot.");

        document.getElementById("waBtn").href =
        "https://wa.me/918515876235?text=" + msg;

    }, 4000);
}

</script>

</body>
</html>
